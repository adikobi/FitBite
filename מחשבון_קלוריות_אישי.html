<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FitBite AI - מחשבון תזונה ומתכונים אישי</title>
    <!-- Tailwind CSS for modern sleek styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Heebo for clean premium Hebrew UI -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Heebo', sans-serif;
            background-color: #080c14;
            color: #e2e8f0;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom scrollbar for premium feel */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0b0f19;
        }
        ::-webkit-scrollbar-thumb {
            background: #10b981;
            border-radius: 3px;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .glow-emerald {
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.12);
        }
        .glow-emerald-hover:active {
            transform: scale(0.97);
        }
        @media (hover: hover) {
            .glow-emerald-hover:hover {
                box-shadow: 0 0 25px rgba(16, 185, 129, 0.25);
                transition: all 0.2s ease;
            }
        }
        /* Active button haptic feel */
        .btn-active:active {
            transform: scale(0.95);
        }
        /* Hide native scrollbars on mobile */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // User's provided API Key preloaded securely
        const PRELOADED_API_KEY = "AQ.Ab8RN6IEHMlOMfgLojhdDO8Kq8l2kdFKkwcVpWLdCeThUHpomw";

        // Clean inline SVG components to prevent DOM mismatch crashes
        const FlameIcon = () => (

        const HistoryIcon = () => (

        const AlertTriangleIcon = () => (

        const UtensilsIcon = ({ className = "w-4 h-4" }) => (

        const SpoonIcon = ({ className = "w-4 h-4" }) => (

        const ScaleIcon = ({ className = "w-4 h-4" }) => (

        const CalculatorIcon = ({ className = "w-4 h-4" }) => (
            <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" strokeLinecap="round" strokeLinejoin="round">
                <rect x="4" y="2" width="16" height="20" rx="2" ry="2" />
                <line x1="8" y1="6" x2="16" y2="6" />
                <line x1="16" y1="14" x2="16" y2="18" />
                <path d="M16 10h.01M12 10h.01M8 10h.01M12 14h.01M8 14h.01M12 18h.01M8 18h.01" />
            </svg>
        );

        const ListChecksIcon = () => (
            <svg className="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" strokeLinecap="round" strokeLinejoin="round">
                <path d="m3 17 2 2 4-4M3 7l2 2 4-4M13 6h8M13 12h8M13 18h8" />
            </svg>
        );

        const CopyIcon = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" strokeLinecap="round" strokeLinejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
        );

        const TrashIcon = () => (
            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="3 6 5 6 21 6" />
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </svg>
        );

        function RecipeApp() {
            const [apiKey, setApiKey] = useState(() => {
                return localStorage.getItem("fitbite_api_key") || PRELOADED_API_KEY;
            });
            const [showSettings, setShowSettings] = useState(false);
            const [recipeText, setRecipeText] = useState("");
            const [servings, setServings] = useState(4);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [toastMessage, setToastMessage] = useState("");
            
            // App state for current analysis result
            const [analysisResult, setAnalysisResult] = useState(null);
            
            // Dynamic correction state variables for high-precision
            const [cookedWeight, setCookedWeight] = useState(320);
            const [tableSpoonWeight, setTableSpoonWeight] = useState(15);

            // Session history (stored in localStorage with fallback to demo recipe)
            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem("fitbite_history");
                if (saved) {
                    try {
                        return JSON.parse(saved);
                    } catch (e) {
                        console.error("Error parsing history from localStorage", e);
                    }
                }
                return [
                    {
                        id: "demo-1",
                        recipeName: "פנקייק חלבון שיבולת שועל",
                        servings: 2,
                        totalCalories: 480,
                        totalWeightGrams: 320,
                        caloriesPer100g: 150,
                        caloriesPerTablespoon: 22,
                        gramsPerTablespoon: 15,
                        totalProtein: 32,
                        totalCarbs: 58,
                        totalFats: 12,
                        ingredients: [
                            { cleanName: "שיבולת שועל דקה", originalText: "כוס שיבולת שועל", weightGrams: 80, calories: 300, protein: 10, carbs: 53, fats: 5 },
                            { cleanName: "אבקת חלבון", originalText: "סקופ אבקת חלבון וניל", weightGrams: 30, calories: 120, protein: 24, carbs: 2, fats: 1.5 },
                            { cleanName: "חלב שקדים", originalText: "חצי כוס חלב שקדים", weightGrams: 120, calories: 30, protein: 1, carbs: 1, fats: 2.5 },
                            { cleanName: "ביצה לארג'", originalText: "ביצה אחת", weightGrams: 50, calories: 70, protein: 6, carbs: 0, fats: 5 }
                        ],
                        dietaryNotes: ["עשיר בחלבון", "מתאים לחיטוב", "דל סוכר"],
                        recipeText: "כוס שיבולת שועל (80 גרם)\nסקופ אבקת חלבון וניל (30 גרם)\nחצי כוס חלב שקדים (120 גרם)\nביצה אחת (50 גרם)"
                    }
                ];
            });

            // Persist history to localStorage
            useEffect(() => {
                localStorage.setItem("fitbite_history", JSON.stringify(history));
            }, [history]);

            // Interactive calculator state
            const [activeTab, setActiveTab] = useState("serving"); // "serving", "tablespoon", "100g", "custom"
            const [customGrams, setCustomGrams] = useState(100);

            // Mobile view tab state: "input" or "calculator"
            const [mobileSection, setMobileSection] = useState("input");

            // Show Toast helper
            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => {
                    setToastMessage("");
                }, 2500);
            };

            // Load a demo recipe to test quickly on phone
            const loadDemoRecipe = () => {
                setRecipeText("גביע קוטג' 5% (250 גרם)\n2 ביצים\n3 כפות קמח שיבולת שועל (כ-30 גרם)\nקורט מלח ופלפל");
                setServings(2);
                showToast("נטען מתכון לדוגמה!");
            };

            // Clear recipe textarea
            const clearRecipeText = () => {
                setRecipeText("");
                showToast("הטקסט נמחק");
            };

            // Clipboard paste helper
            const pasteFromClipboard = async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    if (text) {
                        setRecipeText(text);
                        showToast("הטקסט הועתק מהלוח!");
                    } else {
                        showToast("הלוח ריק");
                    }
                } catch (err) {
                    showToast("אין הרשאה לקרוא מהלוח. אנא הדביקי ידנית.");
                }
            };

            // Macro ratio utility to prevent division-by-zero or NaN
            const getMacroPercentage = (macroVal, protein, carbs, fats) => {
                const p = Math.max(0, protein || 0);
                const c = Math.max(0, carbs || 0);
                const f = Math.max(0, fats || 0);
                const sum = p + c + f;
                if (sum === 0) return 0;
                return Math.min(100, Math.round((macroVal / sum) * 100));
            };

            // Synchronize high precision states when analysis result or demo changes
            useEffect(() => {
                if (analysisResult) {
                    setCookedWeight(analysisResult.totalWeightGrams);
                    setTableSpoonWeight(analysisResult.gramsPerTablespoon || 15);
                }
            }, [analysisResult]);

            const deleteFromHistory = (id, e) => {
                if (e) e.stopPropagation();
                setHistory(prev => {
                    const filtered = prev.filter(item => item.id !== id);
                    if (analysisResult && analysisResult.id === id) {
                        setAnalysisResult(null);
                    }
                    return filtered;
                });
                showToast("המתכון נמחק מההיסטוריה");
            };

            const handleAnalyzeRecipe = async (e) => {
                if (e) e.preventDefault();
                if (!recipeText.trim()) {
                    setError("אנא הכניסי קודם כל את טקסט המתכון.");
                    return;
                }

                setLoading(true);
                setError(null);

                const systemInstruction = `
                    You are an elite, professional nutritional science analyst and sports dietitian.
                    Analyze the recipe text provided by the user. Convert all ingredients into precise weights in grams and estimate their calories, protein, carbs, and fats correctly.
                    Estimate the physical state of the dish (e.g. liquid, thick paste, baking, light powder) and provide a smart estimated average weight of ONE single tablespoon of this combined recipe in "gramsPerTablespoon" (e.g., honey is ~21g, water/milk/soups are ~15g, heavy spreads/peanut butter are ~18-24g, light powders/cereals/coconut are ~5-8g).
                    Respond ONLY with a valid, clean JSON object. Do not include markdown code block syntax (like \`\`\`json) or any preamble or wrap up. Just raw JSON.
                    The JSON structure must match this exact format:
                    {
                      "recipeName": "Provide a descriptive name in Hebrew",
                      "totalCalories": total recipe calories (integer),
                      "totalWeightGrams": total weight of ingredients in grams (integer),
                      "caloriesPer100g": calories per 100g (integer),
                      "caloriesPerTablespoon": calories in one average tablespoon of this combined recipe (integer),
                      "gramsPerTablespoon": weight of one tablespoon of this recipe in grams (integer),
                      "totalProtein": total protein in recipe in grams (integer),
                      "totalCarbs": total carbohydrates in recipe in grams (integer),
                      "totalFats": total fats in recipe in grams (integer),
                      "ingredients": [
                        {
                          "originalText": "the original line of text",
                          "cleanName": "clean Hebrew name of ingredient",
                          "weightGrams": estimated weight in grams (integer),
                          "calories": estimated calories for this quantity (integer),
                          "protein": estimated protein in grams (integer),
                          "carbs": estimated carbohydrates in grams (integer),
                          "fats": estimated fats in grams (integer)
                        }
                      ],
                      "dietaryNotes": ["up to 3 tags in Hebrew about the recipe, e.g., 'דל פחמימה', 'חלבון גבוה', 'טבעוני', 'קל להכנה'"]
                    }
                `;

                const userPrompt = `
                    Recipe text to analyze:
                    ${recipeText}
                    
                    Number of planned servings: ${servings}
                `;

                try {
                    const response = await fetch(
                        "https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=" + apiKey,
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userPrompt }] }],
                                systemInstruction: {
                                    parts: [{ text: systemInstruction }]
                                },
                                generationConfig: {
                                    responseMimeType: "application/json"
                                }
                            })
                        }
                    );

                    if (!response.ok) {
                        throw new Error("שגיאה בתקשורת עם ה-AI. יש לוודא שמפתח ה-API תקין ושיש חיבור אינטרנט.");
                    }

                    const data = await response.json();
                    
                    let rawText = "";
                    if (data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
                        rawText = data.candidates[0].content.parts[0].text;
                    }
                    
                    if (!rawText) {
                        throw new Error("לא התקבל מידע חזרה מהניתוח. אנא נסי שוב בניסוח ברור יותר.");
                    }

                    // Parse the JSON
                    const parsedResult = JSON.parse(rawText);
                    
                    // Add calculated fields based on current serving input
                    parsedResult.servings = parseInt(servings) || 1;
                    parsedResult.caloriesPerServing = Math.round(parsedResult.totalCalories / parsedResult.servings);
                    parsedResult.id = Date.now().toString();
                    parsedResult.recipeText = recipeText; // Save original recipe input

                    setAnalysisResult(parsedResult);
                    
                    // Add to session history list at the top (filtering out the initial demo-1)
                    setHistory(prev => [parsedResult, ...prev.filter(item => item.id !== "demo-1")]);
                    setActiveTab("serving"); // Default view is serving size

                    // Automatically switch to calculator tab on mobile to avoid scrolling!
                    setMobileSection("calculator");
                    showToast("המתכון נותח בהצלחה!");
                } catch (err) {
                    console.error(err);
                    setError(err.message || "אירעה שגיאה בלתי צפויה בתהליך הניתוח. אנא נסי שוב.");
                } finally {
                    setLoading(false);
                }
            };

            const selectFromHistory = (item) => {
                setAnalysisResult(item);
                setRecipeText(item.recipeText || ""); // Restore raw recipe input so users can easily tweak it
                setServings(item.servings);
                setActiveTab("serving");
                setMobileSection("calculator"); // Switch on mobile to view results
                showToast(`טוען: ${item.recipeName}`);
            };

            // Calculate precise and dynamic metrics on the fly based on user adjustments
            const getCalculatedMetrics = () => {
                if (!analysisResult) return null;
                
                const totalCals = analysisResult.totalCalories;
                const totalProtein = analysisResult.totalProtein || 0;
                const totalCarbs = analysisResult.totalCarbs || 0;
                const totalFats = analysisResult.totalFats || 0;
                
                // Use safe active values in dynamic calculation to allow empty strings when editing
                const activeCookedWeight = cookedWeight === "" ? analysisResult.totalWeightGrams : (parseInt(cookedWeight) || 1);
                const activeTableSpoonWeight = tableSpoonWeight === "" ? (analysisResult.gramsPerTablespoon || 15) : (parseInt(tableSpoonWeight) || 1);
                const activeServings = servings === "" ? 1 : (parseInt(servings) || 1);

                // 1. Recalculate Calories per 100g based on cooked weight
                const currentWeight = activeCookedWeight > 0 ? activeCookedWeight : 1;
                const calPer100g = Math.round((totalCals / currentWeight) * 100);
                const proteinPer100g = Math.round((totalProtein / currentWeight) * 100);
                const carbsPer100g = Math.round((totalCarbs / currentWeight) * 100);
                const fatsPer100g = Math.round((totalFats / currentWeight) * 100);
                
                // 2. Recalculate Calories per tablespoon based on tablespoon weight
                const calPerSpoon = Math.round((calPer100g / 100) * activeTableSpoonWeight);
                const proteinPerSpoon = Math.round((proteinPer100g / 100) * activeTableSpoonWeight);
                const carbsPerSpoon = Math.round((carbsPer100g / 100) * activeTableSpoonWeight);
                const fatsPerSpoon = Math.round((fatsPer100g / 100) * activeTableSpoonWeight);
                
                // 3. Calories per serving is constant per division of total calories
                const calPerServing = Math.round(totalCals / activeServings);
                const proteinPerServing = Math.round(totalProtein / activeServings);
                const carbsPerServing = Math.round(totalCarbs / activeServings);
                const fatsPerServing = Math.round(totalFats / activeServings);

                return {
                    calPer100g,
                    calPerSpoon,
                    calPerServing,
                    proteinPer100g,
                    carbsPer100g,
                    fatsPer100g,
                    proteinPerSpoon,
                    carbsPerSpoon,
                    fatsPerSpoon,
                    proteinPerServing,
                    carbsPerServing,
                    fatsPerServing
                };
            };

            const metrics = getCalculatedMetrics();

            const getDisplayMetric = () => {
                if (!analysisResult || !metrics) return null;

                const totalProtein = analysisResult.totalProtein || 0;
                const totalCarbs = analysisResult.totalCarbs || 0;
                const totalFats = analysisResult.totalFats || 0;

                const activeServings = servings === "" ? 1 : (parseInt(servings) || 1);
                const activeTableSpoonWeight = tableSpoonWeight === "" ? (analysisResult.gramsPerTablespoon || 15) : (parseInt(tableSpoonWeight) || 1);
                const activeCookedWeight = cookedWeight === "" ? analysisResult.totalWeightGrams : (parseInt(cookedWeight) || 1);
                const activeCustomGrams = customGrams === "" ? 100 : (parseInt(customGrams) || 1);

                switch(activeTab) {
                    case "serving":
                        return {
                            val: metrics.calPerServing,
                            protein: metrics.proteinPerServing,
                            carbs: metrics.carbsPerServing,
                            fats: metrics.fatsPerServing,
                            label: "קלוריות למנה אישית",
                            sub: `לפי חלוקת סך הקלוריות ל-${activeServings} מנות שוות`
                        };
                    case "tablespoon":
                        return {
                            val: metrics.calPerSpoon,
                            protein: metrics.proteinPerSpoon,

                                                <span className="text-[11px] md:text-xs">ל-100 גרם</span>
                                            </button>
                                            <button 
                                                onClick={() => setActiveTab("custom")}
                                                className={`p-2.5 rounded-xl flex flex-col items-center gap-1 transition-all border ${
                                                    activeTab === "custom" 
                                                    ? 'bg-emerald-500 text-slate-950 font-extrabold border-emerald-400 shadow-lg shadow-emerald-500/25 scale-[1.02]'
                                                    : 'bg-slate-900/90 hover:bg-slate-800 border-slate-800/80 text-slate-400'
                                                }`}
                                            >
                                                <CalculatorIcon className={`w-3.5 h-3.5 md:w-4 md:h-4 ${activeTab === 'custom' ? 'text-slate-950' : 'text-emerald-500/80'}`} />
                                                <span className="text-[11px] md:text-xs">חישוב מותאם</span>
                                            </button>
                                        </div>

                                        {/* Large Circular/Square Calorie Display Badge with Macronutrients */}
                                        <div className="bg-slate-950/80 p-5 md:p-6 rounded-2xl border border-slate-800/80 space-y-4 relative">
                                            <div className="flex flex-col items-center text-center space-y-1">
                                                <span className="text-emerald-400 text-[10px] md:text-xs font-bold tracking-wider uppercase">{currentMetric.label}</span>
                                                <div className="flex items-baseline justify-center">
                                                    <span className="text-4xl md:text-5xl lg:text-6xl font-black text-white tracking-tighter">{currentMetric.val}</span>
                                                    <span className="text-sm md:text-base font-bold text-slate-400 mr-1.5">קלוריות</span>
                                                </div>
                                                <p className="text-[10px] md:text-xs text-slate-500">{currentMetric.sub}</p>
                                            </div>

                                            {/* Beautiful Macronutrients Cards/Progress indicators */}
                                            <div className="grid grid-cols-3 gap-3 pt-2 border-t border-slate-800/60">
                                                <div className="flex flex-col items-center p-2 bg-blue-500/10 rounded-xl border border-blue-500/15">
                                                    <span className="text-[10px] text-blue-400 font-bold block mb-1">חלבון</span>
                                                    <span className="text-sm md:text-base font-black text-white">{currentMetric.protein || 0}ג׳</span>
                                                    <div className="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden mt-1.5">
                                                        <div className="bg-blue-500 h-full rounded-full" style={{ width: `${getMacroPercentage(currentMetric.protein, currentMetric.protein, currentMetric.carbs, currentMetric.fats)}%` }}></div>
                                                    </div>
                                                </div>
                                                <div className="flex flex-col items-center p-2 bg-amber-500/10 rounded-xl border border-amber-500/15">
                                                    <span className="text-[10px] text-amber-400 font-bold block mb-1">פחמימות</span>
                                                    <span className="text-sm md:text-base font-black text-white">{currentMetric.carbs || 0}ג׳</span>
                                                    <div className="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden mt-1.5">
                                                        <div className="bg-amber-500 h-full rounded-full" style={{ width: `${getMacroPercentage(currentMetric.carbs, currentMetric.protein, currentMetric.carbs, currentMetric.fats)}%` }}></div>
                                                    </div>
                                                </div>
                                                <div className="flex flex-col items-center p-2 bg-rose-500/10 rounded-xl border border-rose-500/15">
                                                    <span className="text-[10px] text-rose-400 font-bold block mb-1">שומן</span>
                                                    <span className="text-sm md:text-base font-black text-white">{currentMetric.fats || 0}ג׳</span>
                                                    <div className="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden mt-1.5">
                                                        <div className="bg-rose-500 h-full rounded-full" style={{ width: `${getMacroPercentage(currentMetric.fats, currentMetric.protein, currentMetric.carbs, currentMetric.fats)}%` }}></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Super Interactive Gram Jump & Correction Section */}
                                        <div className="bg-emerald-500/[0.03] border border-emerald-500/15 p-4 rounded-xl space-y-4">

                                            {/* Tab Indicator Title */}
                                            <div className="flex items-center justify-between">
                                                <h3 className="text-xs font-bold text-emerald-400 flex items-center gap-1.5">
                                                    <InfoIcon />
                                                    כיול ודיוק מדעי (לפי המשקל בפועל)
                                                </h3>
                                                <span className="text-[9px] bg-emerald-500/10 text-emerald-300 px-2 py-0.5 rounded font-bold">דיוק 100%</span>
                                            </div>

                                            {/* Smart Steppers for Weight Adjustment */}
                                            <div className="space-y-4">

                                                {/* Weight Adjustment block with swift-jump buttons */}
                                                <div className="bg-slate-950/50 p-3 rounded-lg border border-slate-900 space-y-3">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-xs text-slate-300 font-medium">משקל סופי מבושל / אפוי של המנה:</span>
                                                        <span className="text-xs text-emerald-400 font-black bg-emerald-500/10 px-2.5 py-1 rounded border border-emerald-500/20">{cookedWeight} ג'</span>
                                                    </div>

                                                    {/* Smart Gram Shifting Step controllers */}
                                                    <div className="flex items-center gap-2">
                                                        <button
                                                            type="button"
                                                            onClick={() => adjustCookedWeight(-50)}
                                                            className="flex-1 py-1.5 bg-slate-900 hover:bg-slate-850 active:bg-slate-800 text-[11px] text-slate-400 font-bold rounded-lg border border-slate-800 btn-active"
                                                        >
                                                            -50
                                                        </button>
                                                        <button
                                                            type="button"
                                                            onClick={() => adjustCookedWeight(-10)}
                                                            className="flex-1 py-1.5 bg-slate-900 hover:bg-slate-850 active:bg-slate-800 text-[11px] text-slate-400 font-bold rounded-lg border border-slate-800 btn-active"
                                                        >
                                                            -10
                                                        </button>

                                                        {/* Native numeric input field */}
                                                        <input
                                                            type="number"
                                                            pattern="[0-9]*"
                                                            inputMode="numeric"
                                                            value={cookedWeight}
                                                            onChange={(e) => setCookedWeight(Math.max(1, parseInt(e.target.value) || 0))}
                                                            className="w-16 bg-slate-950 border border-emerald-500/30 text-center text-sm font-bold text-white rounded-lg py-1 focus:outline-none focus:border-emerald-500"
                                                        />

                                                        <button
                                                            type="button"
                                                            onClick={() => adjustCookedWeight(10)}
                                                            className="flex-1 py-1.5 bg-slate-900 hover:bg-slate-850 active:bg-slate-800 text-[11px] text-slate-400 font-bold rounded-lg border border-slate-800 btn-active"
                                                        >
                                                            +10
                                                        </button>
                                                        <button
                                                            type="button"
                                                            onClick={() => adjustCookedWeight(50)}
                                                            className="flex-1 py-1.5 bg-slate-900 hover:bg-slate-850 active:bg-slate-800 text-[11px] text-slate-400 font-bold rounded-lg border border-slate-800 btn-active"
                                                        >
                                                            +50
                                                        </button>
                                                    </div>

                                                    {/* Presets and range slider for easy broad jumps */}
                                                    <div className="flex flex-wrap items-center gap-1.5 pt-1">
                                                        <span className="text-[10px] text-slate-500 ml-1">קיצורים:</span>
                                                        <button
                                                            type="button"
                                                            onClick={() => setCookedWeight(analysisResult.totalWeightGrams)}
                                                            className="text-[9px] bg-slate-900 hover:bg-slate-850 text-slate-300 px-2 py-1 rounded border border-slate-800 btn-active"
                                                        >
                                                            משקל מקורי AI ({analysisResult.totalWeightGrams}ג')
                                                        </button>
                                                        <button
                                                            type="button"
                                                            onClick={() => setCookedWeight(Math.round(analysisResult.totalWeightGrams * 0.7))}
                                                            className="text-[9px] bg-slate-900 hover:bg-slate-850 text-slate-300 px-2 py-1 rounded border border-slate-800 btn-active"
                                                        >
                                                            צמצום נוזלים (-30%)
                                                        </button>
                                                        <button
                                                            type="button"
                                                            onClick={() => setCookedWeight(Math.round(analysisResult.totalWeightGrams * 1.3))}
                                                            className="text-[9px] bg-slate-900 hover:bg-slate-850 text-slate-300 px-2 py-1 rounded border border-slate-800 btn-active"
                                                        >
                                                            תוספת מים (+30%)
                                                        </button>
                                                    </div>
                                                </div>

                                                {/* Tablespoon Weight block with easy controls */}
                                                <div className="bg-slate-950/50 p-3 rounded-lg border border-slate-900 space-y-2">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-xs text-slate-300 font-medium">משקל כף הגשה אחת:</span>
                                                        <div className="flex items-center gap-2">
                                                            <button 
                                                                type="button"
                                                                onClick={() => setTableSpoonWeight(Math.max(1, tableSpoonWeight - 1))}
                                                                className="w-7 h-7 bg-slate-900 text-emerald-400 font-black rounded flex items-center justify-center border border-slate-800 btn-active text-sm"
                                                            >
                                                                -
                                                            </button>
                                                            <span className="text-xs text-white font-extrabold">{tableSpoonWeight} ג'</span>
                                                            <button 
                                                                type="button"
                                                                onClick={() => setTableSpoonWeight(tableSpoonWeight + 1)}
                                                                className="w-7 h-7 bg-slate-900 text-emerald-400 font-black rounded flex items-center justify-center border border-slate-800 btn-active text-sm"
                                                            >
                                                                +
                                                            </button>
                                                        </div>
                                                    </div>
                                                    <div className="grid grid-cols-3 gap-1.5">
                                                        <button 
                                                            type="button"
                                                            onClick={() => setTableSpoonWeight(6)} 
                                                            className={`text-[9px] py-1 px-1 rounded text-center border transition-all btn-active ${tableSpoonWeight === 6 ? 'bg-emerald-500 text-slate-950 font-bold border-emerald-500' : 'bg-slate-900/50 border-slate-800 text-slate-400'}`}
                                                        >
                                                            קלה (קורנפלקס) ~6ג'
                                                        </button>
                                                        <button 
                                                            type="button"
                                                            onClick={() => setTableSpoonWeight(15)} 
                                                            className={`text-[9px] py-1 px-1 rounded text-center border transition-all btn-active ${tableSpoonWeight === 15 ? 'bg-emerald-500 text-slate-950 font-bold border-emerald-500' : 'bg-slate-900/50 border-slate-800 text-slate-400'}`}
                                                        >
                                                            בינונית (נוזלים/מרק) ~15ג'
                                                        </button>
                                                        <button 
                                                            type="button"
                                                            onClick={() => setTableSpoonWeight(24)} 
                                                            className={`text-[9px] py-1 px-1 rounded text-center border transition-all btn-active ${tableSpoonWeight === 24 ? 'bg-emerald-500 text-slate-950 font-bold border-emerald-500' : 'bg-slate-900/50 border-slate-800 text-slate-400'}`}
                                                        >
                                                            כבדה (ממרח/פירה) ~24ג'
                                                        </button>
                                                    </div>
                                                </div>

                                            </div>
                                        </div>

                                        {/* Custom Gram interactive calculation */}
                                        {activeTab === "custom" && (
                                            <div className="mt-2 p-3.5 bg-slate-950/80 rounded-xl border border-slate-800/80 space-y-3">
                                                <h4 className="text-xs font-bold text-slate-300">הגדירי כמות מדויקת לצריכה בצלחת:</h4>

                                                <div className="flex items-center gap-2">
                                                    <button
                                                        type="button"
                                                        onClick={() => adjustCustomGrams(-50)}
                                                        className="px-2 py-1.5 bg-slate-900 hover:bg-slate-850 text-[10px] font-bold rounded border border-slate-850 btn-active text-slate-400"
                                                    >
                                                        -50ג'
                                                    </button>
                                                    <button
                                                        type="button"
                                                        onClick={() => adjustCustomGrams(-10)}
                                                        className="px-2 py-1.5 bg-slate-900 hover:bg-slate-850 text-[10px] font-bold rounded border border-slate-850 btn-active text-slate-400"
                                                    >
                                                        -10ג'
                                                    </button>

                                                    <input
                                                        type="number"
                                                        pattern="[0-9]*"
                                                        inputMode="numeric"
                                                        min="1"
                                                        value={customGrams}
                                                        onChange={(e) => setCustomGrams(Math.max(1, parseInt(e.target.value) || 0))}
                                                        className="flex-grow bg-slate-900 border border-emerald-500/30 rounded-lg py-1.5 text-center text-sm font-extrabold text-white focus:outline-none focus:border-emerald-500"
                                                    />

                                                    <button
                                                        type="button"
                                                        onClick={() => adjustCustomGrams(10)}
                                                        className="px-2 py-1.5 bg-slate-900 hover:bg-slate-850 text-[10px] font-bold rounded border border-slate-850 btn-active text-slate-400"
                                                    >
                                                        +10ג'
                                                    </button>
                                                    <button
                                                        type="button"
                                                        onClick={() => adjustCustomGrams(50)}
                                                        className="px-2 py-1.5 bg-slate-900 hover:bg-slate-850 text-[10px] font-bold rounded border border-slate-850 btn-active text-slate-400"
                                                    >
                                                        +50ג'
                                                    </button>
                                                </div>

                                                {/* Preselected values selector grids */}
                                                <div className="grid grid-cols-4 gap-1.5">
                                                    {[50, 100, 150, 200, 250, 300, 400, 500].map((val) => (
                                                        <button
                                                            key={val}
                                                            type="button"
                                                            onClick={() => setCustomGrams(val)}
                                                            className={`py-1 text-[10px] font-semibold rounded border text-center transition-colors btn-active ${customGrams === val ? 'bg-emerald-500 border-emerald-500 text-slate-950 font-bold' : 'bg-slate-900/50 border-slate-800 text-slate-400 hover:bg-slate-800'}`}
                                                        >
                                                            {val}ג'
                                                        </button>
                                                    ))}
                                                </div>

                                                <div className="pt-2.5 border-t border-slate-900 flex justify-between items-center text-[11px]">
                                                    <span className="text-slate-400">כמה כפות זה בערך?</span>
                                                    <span className="text-emerald-400 font-bold bg-emerald-500/5 px-2 py-0.5 rounded border border-emerald-500/10">
                                                        {Math.round((customGrams / (tableSpoonWeight || 15)) * 10) / 10} כפות הגשה
                                                    </span>
                                                </div>
                                            </div>
                                        )}

                                        {/* Extra General Stats Footer Row */}
                                        <div className="grid grid-cols-3 gap-2 mt-2 pt-3 border-t border-slate-800/80 text-center">
                                            <div className="bg-slate-950/40 p-2 rounded-lg">
                                                <span className="text-[9px] text-slate-500 block">סה"כ במתכון</span>
                                                <span className="text-xs font-bold text-white">{analysisResult.totalCalories} קל'</span>
                                            </div>
                                            <div className="bg-slate-950/40 p-2 rounded-lg">
                                                <span className="text-[9px] text-slate-500 block">משקל מבושל</span>
                                                <span className="text-xs font-bold text-white">{cookedWeight} גרם</span>
                                            </div>
                                            <div className="bg-slate-950/40 p-2 rounded-lg">
                                                <span className="text-[9px] text-slate-500 block">כף הגשה אחת</span>
                                                <span className="text-xs font-bold text-white">~ {tableSpoonWeight} ג'</span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Ingredient Breakdown */}
                                    <div className="glass-card p-4 md:p-6 rounded-2xl space-y-3">
                                        <h3 className="text-xs md:text-sm font-bold text-slate-300 flex items-center justify-between">
                                            <span className="flex items-center gap-2">
                                                <ListChecksIcon />
                                                פירוט וניתוח רכיבים מהמתכון
                                            </span>
                                            <span className="text-[10px] text-slate-500">לפי ניתוח ה-AI</span>
                                        </h3>

                                        <div className="divide-y divide-slate-800/80 animate-fade-in">
                                            {analysisResult.ingredients && analysisResult.ingredients.map((ing, index) => (
                                                <div key={index} className="py-3 flex justify-between items-center text-xs md:text-sm first:pt-0 last:pb-0 gap-2">
                                                    <div className="space-y-1 flex-grow">
                                                        <span className="font-bold text-slate-100 block">{ing.cleanName}</span>
                                                        <span className="text-[10px] text-slate-400 block leading-tight">{ing.originalText}</span>
                                                        {/* Individual Ingredient Macro badges */}
                                                        <div className="flex gap-1.5 items-center mt-1">
                                                            <span className="text-[9px] bg-blue-500/10 text-blue-400 px-1.5 py-0.5 rounded font-bold">ח׳: {ing.protein || 0}ג׳</span>
                                                            <span className="text-[9px] bg-amber-500/10 text-amber-400 px-1.5 py-0.5 rounded font-bold">פ׳: {ing.carbs || 0}ג׳</span>
                                                            <span className="text-[9px] bg-rose-500/10 text-rose-400 px-1.5 py-0.5 rounded font-bold">ש׳: {ing.fats || 0}ג׳</span>
                                                        </div>
                                                    </div>
                                                    <div className="text-left flex-shrink-0">
                                                        <span className="font-black text-white block text-sm">{ing.calories} קל'</span>
                                                        <span className="text-[10px] text-emerald-400 block font-bold">~ {ing.weightGrams} גרם</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </section>

                    </main>

                    {/* Footer - Compact for mobile usage */}
                    <footer className="pt-6 pb-2 border-t border-slate-900 text-center text-[10px] text-slate-500 space-y-1">
                        <p>© 2026 FitBite AI • עוצב מחדש לטלפונים ניידים</p>
                        <p className="max-w-md mx-auto text-[9px] leading-relaxed px-4">
                            הערכים מבוססים על ניתוח AI. תמיד מומלץ לאמת מוצרים מסוימים מול גב האריזה.
                        </p>
                    </footer>

                    {/* Sticky Thumb-Friendly Bottom Navigation Bar for Mobile */}
                    <nav className="md:hidden fixed bottom-0 left-0 right-0 z-40 bg-[#070b13]/95 backdrop-blur-md border-t border-slate-800/80 px-6 py-2.5 flex justify-around items-center shadow-2xl">

                        <button
                            onClick={() => setMobileSection("input")}
                            className={`flex flex-col items-center gap-1 transition-all ${mobileSection === 'input' ? 'text-emerald-400' : 'text-slate-500'}`}
                        >
                            <div className={`p-1.5 rounded-xl ${mobileSection === 'input' ? 'bg-emerald-500/10' : ''}`}>
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24" strokeLinecap="round" strokeLinejoin="round">
                                    <path d="M12 20h9" />
                                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                                </svg>
                            </div>
                            <span className="text-[10px] font-black">המתכון שלי</span>
                        </button>

                        <button
                            onClick={() => setMobileSection("calculator")}
                            className={`flex flex-col items-center gap-1 transition-all relative ${mobileSection === 'calculator' ? 'text-emerald-400' : 'text-slate-500'}`}
                        >
                            <div className={`p-1.5 rounded-xl ${mobileSection === 'calculator' ? 'bg-emerald-500/10' : ''}`}>
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24" strokeLinecap="round" strokeLinejoin="round">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                    <line x1="9" y1="9" x2="15" y2="9" />
                                    <line x1="9" y1="13" x2="15" y2="13" />
                                    <line x1="9" y1="17" x2="15" y2="17" />
                                </svg>
                            </div>
                            <span className="text-[10px] font-black">מחשבון קלוריות</span>
                            {analysisResult && (
                                <span className="absolute top-1 right-2 w-2 h-2 bg-emerald-400 rounded-full animate-ping"></span>
                            )}
                        </button>
                    </nav>
                </div>
            );
        }

        // Render the main app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RecipeApp />);
    </script>
</body>
</html>
