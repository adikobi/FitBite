<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FitBite AI — מחשבון תזונה ומתכונים אישי</title>
    <!-- Tailwind CSS for modern sleek styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Assistant for crisp, modern Hebrew and Playfair Display for premium serif details -->
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,800;1,400&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#FDFBF7',      /* Soft luxury ivory backdrop */
                        sage: '#F3F6F1',       /* Calming soft sage surface */
                        forest: '#1B3B2B',     /* Rich deep editorial green */
                        moss: '#4A614C',       /* Earthy dark green */
                        terracotta: '#D47E61', /* Warm clay highlight */
                        earth: '#2E2B27',      /* Soft charcoal-brown for readable text */
                        sand: '#EAE6DD',       /* Gentle borders */
                    },
                    fontFamily: {
                        sans: ['Assistant', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #FDFBF7;
            color: #2E2B27;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* Custom elegant scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #FDFBF7;
        }
        ::-webkit-scrollbar-thumb {
            background: #1B3B2B;
            border-radius: 3px;
        }

        /* Editorial minimal shadows */
        .editorial-card {
            background: #FFFFFF;
            border: 1px solid #EAE6DD;
            box-shadow: 0 4px 20px -2px rgba(46, 43, 39, 0.04);
        }

        /* Interactive spring transitions */
        .btn-editorial {
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .btn-editorial:active {
            transform: scale(0.96);
        }

        @media (hover: hover) {
            .btn-editorial:hover {
                transform: translateY(-1px);
            }
        }

        /* Custom subtle pulsing scanner line for loading state */
        @keyframes subtle-pulse {
            0% { opacity: 0.3; }
            50% { opacity: 0.8; }
            100% { opacity: 0.3; }
        }
        .pulse-soft {
            animation: subtle-pulse 2s infinite ease-in-out;
        }

        /* Hide native scrollbars on mobile */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between pb-24 md:pb-8 selection:bg-forest selection:text-white">

    <div id="root" class="w-full max-w-7xl mx-auto p-4 sm:p-6 md:p-8 flex-grow"></div>

    <!-- React and Babel Standalone for direct execution in browser -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const MY_TEXT = "AQ.Ab8RN6KvKgP9yzeXwZfQL1ewoM0ARnpe6QxRm8q3VqmzNoVzGw";

        // Clean, elegant vector icons
        const FlameIcon = () => (
            <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
            </svg>
        );

        const InfoIcon = () => (
            <svg className="w-4 h-4 text-forest" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        const KeyIcon = () => (
            <svg className="w-4 h-4 text-forest" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M15 7a2 2 0 012 2m-5 3a5 5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" />
            </svg>
        );

        const ShieldCheckIcon = () => (
            <svg className="w-5 h-5 text-forest" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
        );

        const FileTextIcon = () => (
            <svg className="w-5 h-5 text-forest" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
        );

        const SparklesIcon = ({ className = "w-5 h-5 text-forest" }) => (
            <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
            </svg>
        );

        const HistoryIcon = () => (
            <svg className="w-4 h-4 text-moss" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        const AlertTriangleIcon = () => (
            <svg className="w-5 h-5 text-terracotta flex-shrink-0" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        );

        const CopyIcon = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
            </svg>
        );

        const TrashIcon = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        );

        function RecipeApp() {
            const [apiKey, setApiKey] = useState(() => {
                return localStorage.getItem("fitbite_api_key") || MY_TEXT;
            });
            const [showSettings, setShowSettings] = useState(false);
            const [recipeText, setRecipeText] = useState("");
            const [servings, setServings] = useState(4);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [toastMessage, setToastMessage] = useState("");
            
            const [analysisResult, setAnalysisResult] = useState(null);
            
            const [cookedWeight, setCookedWeight] = useState(320);
            const [tableSpoonWeight, setTableSpoonWeight] = useState(15);

            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem("fitbite_history");
                if (saved) {
                    try {
                        return JSON.parse(saved);
                    } catch (e) {
                        console.error("Error parsing history from localStorage", e);
                    }
                }
                return [
                    {
                        id: "demo-1",
                        recipeName: "פנקייק חלבון שיבולת שועל",
                        servings: 2,
                        totalCalories: 480,
                        totalWeightGrams: 320,
                        caloriesPer100g: 150,
                        caloriesPerTablespoon: 22,
                        gramsPerTablespoon: 15,
                        totalProtein: 32,
                        totalCarbs: 58,
                        totalFats: 12,
                        ingredients: [
                            { cleanName: "שיבולת שועל דקה", originalText: "כוס שיבולת שועל", weightGrams: 80, calories: 300, protein: 10, carbs: 53, fats: 5 },
                            { cleanName: "אבקת חלבון", originalText: "סקופ אבקת חלבון וניל", weightGrams: 30, calories: 120, protein: 24, carbs: 2, fats: 1.5 },
                            { cleanName: "חלב שקדים", originalText: "חצי כוס חלב שקדים", weightGrams: 120, calories: 30, protein: 1, carbs: 1, fats: 2.5 },
                            { cleanName: "ביצה לארג'", originalText: "ביצה אחת", weightGrams: 50, calories: 70, protein: 6, carbs: 0, fats: 5 }
                        ],
                        dietaryNotes: ["עשיר בחלבון", "מתאים לחיטוב", "דל סוכר"]
                    }
                ];
            });

            useEffect(() => {
                localStorage.setItem("fitbite_history", JSON.stringify(history));
            }, [history]);

            const [activeTab, setActiveTab] = useState("serving"); // "serving", "tablespoon", "100g", "custom"
            const [customGrams, setCustomGrams] = useState(100);
            const [mobileSection, setMobileSection] = useState("input");

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => {
                    setToastMessage("");
                }, 2800);
            };

            const loadDemoRecipe = () => {
                setRecipeText("גביע קוטג' 5% (250 גרם)\n2 ביצים\n3 כפות קמח שיבולת שועל (כ-30 גרם)\nקורט מלח ופלפל");
                setServings(2);
                showToast("🍳 מתכון לדוגמה נטען!");
            };

            const clearRecipeText = () => {
                setRecipeText("");
                showToast("✨ הטופס נוקה");
            };

            useEffect(() => {
                if (analysisResult) {
                    setCookedWeight(analysisResult.totalWeightGrams || 320);
                    setTableSpoonWeight(analysisResult.gramsPerTablespoon || 15);
                }
            }, [analysisResult]);

            const deleteFromHistory = (id, e) => {
                if (e) e.stopPropagation();
                setHistory(prev => {
                    const filtered = prev.filter(item => item.id !== id);
                    if (analysisResult && analysisResult.id === id) {
                        setAnalysisResult(null);
                    }
                    return filtered;
                });
                showToast("🗑️ המתכון הוסר מההיסטוריה");
            };

            const handleAnalyzeRecipe = async (e) => {
                if (e) e.preventDefault();
                if (!recipeText.trim()) {
                    setError("אנא הזיני קודם כל את טקסט המתכון.");
                    return;
                }

                setLoading(true);
                setError(null);

                const systemInstruction = `
                    You are an elite, professional nutritional science analyst and sports dietitian.
                    Analyze the recipe text provided by the user. Convert all ingredients into precise weights in grams and estimate their calories, protein, carbs, and fats correctly.
                    Respond ONLY with a valid, clean JSON object matching this exact format:
                    {
                      "recipeName": "Provide a descriptive name in Hebrew",
                      "totalCalories": total recipe calories (integer),
                      "totalWeightGrams": total weight of ingredients in grams (integer),
                      "caloriesPer100g": calories per 100g (integer),
                      "caloriesPerTablespoon": calories in one average tablespoon (integer),
                      "gramsPerTablespoon": weight of one tablespoon in grams (integer),
                      "totalProtein": total protein in recipe in grams (integer),
                      "totalCarbs": total carbohydrates in recipe in grams (integer),
                      "totalFats": total fats in recipe in grams (integer),
                      "ingredients": [
                        {
                          "originalText": "the original line of text",
                          "cleanName": "clean Hebrew name of ingredient",
                          "weightGrams": estimated weight in grams (integer),
                          "calories": estimated calories (integer),
                          "protein": estimated protein (integer),
                          "carbs": estimated carbohydrates (integer),
                          "fats": estimated fats (integer)
                        }
                      ],
                      "dietaryNotes": ["up to 3 tags in Hebrew"]
                    }
                `;

                const userPrompt = `
                    Recipe text to analyze:
                    ${recipeText}
                    Number of planned servings: ${servings}
                `;

                try {
                    const response = await fetch(
                        "https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=" + apiKey,
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userPrompt }] }],
                                systemInstruction: { parts: [{ text: systemInstruction }] },
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        }
                    );

                    if (!response.ok) {
                        throw new Error("שגיאה בתקשורת עם שרת ה-AI.");
                    }

                    const data = await response.json();
                    let rawText = "";
                    if (data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
                        rawText = data.candidates[0].content.parts[0].text;
                    }

                    if (!rawText) throw new Error("לא התקבלו נתונים תקינים מהאנליזה.");

                    const parsedResult = JSON.parse(rawText);
                    parsedResult.servings = parseInt(servings) || 1;
                    parsedResult.caloriesPerServing = Math.round(parsedResult.totalCalories / parsedResult.servings);
                    parsedResult.id = Date.now().toString();

                    setAnalysisResult(parsedResult);
                    setHistory(prev => [parsedResult, ...prev.filter(item => item.id !== "demo-1")]);
                    setActiveTab("serving");
                    setMobileSection("calculator");
                    showToast("🥗 המתכון נותח בהצלחה!");
                } catch (err) {
                    console.error(err);
                    setError(err.message || "אירעה שגיאה בתהליך הניתוח.");
                } finally {
                    setLoading(false);
                }
            };

            const selectFromHistory = (item) => {
                setAnalysisResult(item);
                setRecipeText("");
                setServings(item.servings || 4);
                setActiveTab("serving");
                setMobileSection("calculator");
                showToast(`📂 נטען: ${item.recipeName}`);
            };

            const getCalculatedMetrics = () => {
                if (!analysisResult) return null;
                const totalCals = analysisResult.totalCalories;
                const totalProtein = analysisResult.totalProtein || 0;
                const totalCarbs = analysisResult.totalCarbs || 0;
                const totalFats = analysisResult.totalFats || 0;
                
                const currentWeight = cookedWeight > 0 ? cookedWeight : 1;
                const calPer100g = Math.round((totalCals / currentWeight) * 100);
                const proteinPer100g = Math.round((totalProtein / currentWeight) * 100);
                const carbsPer100g = Math.round((totalCarbs / currentWeight) * 100);
                const fatsPer100g = Math.round((totalFats / currentWeight) * 100);
                
                const calPerSpoon = Math.round((calPer100g / 100) * tableSpoonWeight);
                const proteinPerSpoon = Math.round((proteinPer100g / 100) * tableSpoonWeight);
                const carbsPerSpoon = Math.round((carbsPer100g / 100) * tableSpoonWeight);
                const fatsPerSpoon = Math.round((fatsPer100g / 100) * tableSpoonWeight);
                
                const calPerServing = Math.round(totalCals / servings);
                const proteinPerServing = Math.round(totalProtein / servings);
                const carbsPerServing = Math.round(totalCarbs / servings);
                const fatsPerServing = Math.round(totalFats / servings);

                return {
                    calPer100g, calPerSpoon, calPerServing,
                    proteinPer100g, carbsPer100g, fatsPer100g,
                    proteinPerSpoon, carbsPerSpoon, fatsPerSpoon,
                    proteinPerServing, carbsPerServing, fatsPerServing
                };
            };

            const metrics = getCalculatedMetrics();

            const getDisplayMetric = () => {
                if (!analysisResult || !metrics) return null;

                switch(activeTab) {
                    case "serving":
                        return {
                            val: metrics.calPerServing,
                            protein: metrics.proteinPerServing,
                            carbs: metrics.carbsPerServing,
                            fats: metrics.fatsPerServing,
                            label: "קלוריות למנה אישית",
                            sub: `לפי חלוקת סך הקלוריות ל-${servings} מנות שוות`
                        };
                    case "tablespoon":
                        return {
                            val: metrics.calPerSpoon,
                            protein: metrics.proteinPerSpoon,
                            carbs: metrics.carbsPerSpoon,
                            fats: metrics.fatsPerSpoon,
                            label: "קלוריות לכף הגשה",
                            sub: `מחושב לפי כף ששוקלת בדיוק ${tableSpoonWeight} גרם`
                        };
                    case "100g":
                        return {
                            val: metrics.calPer100g,
                            protein: metrics.proteinPer100g,
                            carbs: metrics.carbsPer100g,
                            fats: metrics.fatsPer100g,
                            label: "קלוריות ל-100 גרם",
                            sub: `מבוסס על משקל סופי מבושל של ${cookedWeight} גרם`
                        };
                    case "custom":
                        const customVal = Math.round((customGrams / 100) * metrics.calPer100g);
                        const customProtein = Math.round((customGrams / 100) * metrics.proteinPer100g);
                        const customCarbs = Math.round((customGrams / 100) * metrics.carbsPer100g);
                        const customFats = Math.round((customGrams / 100) * metrics.fatsPer100g);
                        return {
                            val: customVal,
                            protein: customProtein,
                            carbs: customCarbs,
                            fats: customFats,
                            label: `קלוריות ל-${customGrams} גרם`,
                            sub: "חישוב מותאם אישית לפי המשקל שהזנת"
                        };
                    default:
                        return null;
                }
            };

            const currentMetric = getDisplayMetric();

            const adjustCookedWeight = (amount) => {
                setCookedWeight(prev => Math.max(1, prev + amount));
            };

            const adjustCustomGrams = (amount) => {
                setCustomGrams(prev => Math.max(1, prev + amount));
            };

            const copySummaryToClipboard = () => {
                if (!analysisResult || !metrics) return;
                const summaryText = `
*סיכום תזונתי מ-FitBite AI* 🍳
מתכון: ${analysisResult.recipeName}
------------------------------
• סה״כ קלוריות למתכון: ${analysisResult.totalCalories} קל׳
• סה״כ חלבון: ${analysisResult.totalProtein || 0}ג׳ | פחמימות: ${analysisResult.totalCarbs || 0}ג׳ | שומן: ${analysisResult.totalFats || 0}ג׳
• משקל מבושל סופי: ${cookedWeight} גרם
• ערכים ל-100 גרם: ${metrics.calPer100g} קל׳ (ח׳: ${metrics.proteinPer100g}ג׳ | פ׳: ${metrics.carbsPer100g}ג׳ | ש׳: ${metrics.fatsPer100g}ג׳)
• ערכים למנה אחת (${servings} מנות): ${metrics.calPerServing} קל׳ (ח׳: ${metrics.proteinPerServing}ג׳ | פ׳: ${metrics.carbsPerServing}ג׳ | ש׳: ${metrics.fatsPerServing}ג׳)
• ערכים לכף הגשה (~${tableSpoonWeight} גרם): ${metrics.calPerSpoon} קל׳ (ח׳: ${metrics.proteinPerSpoon}ג׳ | פ׳: ${metrics.carbsPerSpoon}ג׳ | ש׳: ${metrics.fatsPerSpoon}ג׳)
------------------------------
נאכל בתיאבון ובריאות! 💪
`.trim();

                navigator.clipboard.writeText(summaryText);
                showToast("📋 הסיכום הועתק ללוח!");
            };

            return (
                <div className="space-y-6 md:space-y-10">

                    {/* Editorial Subtle Toast */}
                    {toastMessage && (
                        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-forest text-white px-6 py-3 rounded-xl shadow-xl font-medium text-xs sm:text-sm flex items-center gap-2 border border-white/10 pulse-soft">
                            <SparklesIcon className="w-4 h-4 text-white" />
                            <span>{toastMessage}</span>
                        </div>
                    )}

                    {/* Sophisticated Editorial Header */}
                    <header className="flex justify-between items-end pb-6 border-b border-sand relative">
                        <div className="flex items-center gap-4">
                            <div className="bg-forest text-white p-3 rounded-2xl flex items-center justify-center shadow-sm btn-editorial">
                                <FlameIcon />
                            </div>
                            <div>
                                <h1 className="text-3xl font-extrabold tracking-tight text-forest font-serif italic">
                                    FitBite <span className="font-sans text-xs not-italic font-bold tracking-wider bg-sage text-moss px-2 py-0.5 rounded-full border border-sand">WELLNESS</span>
                                </h1>
                                <p className="text-xs text-moss font-semibold tracking-wide">מחשבון תזונה אישי ומתכונים בעיצוב נקי ומוקפד</p>
                            </div>
                        </div>

                        {/* Beautiful minimal settings trigger */}
                        <button
                            onClick={() => setShowSettings(!showSettings)}
                            className="bg-white border border-sand hover:border-forest/35 text-moss px-4 py-2 rounded-xl text-xs flex items-center gap-2 transition-all btn-editorial shadow-sm font-semibold"
                        >
                            <KeyIcon />
                            <span className="hidden sm:inline">הגדרות API</span>
                        </button>
                    </header>

                    {/* Settings Panel */}
                    {showSettings && (
                        <div className="p-6 bg-white border border-sand rounded-3xl space-y-3 shadow-sm max-w-xl">
                            <h3 className="text-sm font-bold text-forest flex items-center gap-2">
                                <ShieldCheckIcon />
                                הגדרת מפתח Gemini API האישי
                            </h3>
                            <p className="text-xs text-moss leading-relaxed">
                                המפתח נשמר בדפדפן שלך בלבד ומאבטח את כל הפניות הניתוח שלך ישירות לשרתי ה-AI.
                            </p>
                            <div className="flex gap-2">
                                <input 
                                    type="password" 
                                    value={apiKey} 
                                    onChange={(e) => setApiKey(e.target.value)}
                                    className="w-full bg-cream border border-sand rounded-xl px-3 py-2 text-xs sm:text-sm text-earth focus:outline-none focus:border-forest transition-colors font-mono"
                                />
                                <button 
                                    onClick={() => {
                                        localStorage.setItem("fitbite_api_key", apiKey);

                                                    <div className="pt-3 border-t border-sand flex justify-between items-center text-[11px] font-bold text-moss">
                                                        <span>חלוקת כפות הגשה משוערכת:</span>
                                                        <span className="text-forest font-bold bg-sage px-2.5 py-1 rounded-lg border border-sand">
                                                            {Math.round((customGrams / (tableSpoonWeight || 15)) * 10) / 10} כפות
                                                        </span>
                                                    </div>
                                                </div>
                                            )}

                                            {/* Overview Stats */}
                                            <div className="grid grid-cols-3 gap-2 pt-3 border-t border-sand text-center">
                                                <div className="bg-cream p-2.5 rounded-xl border border-sand">
                                                    <span className="text-[10px] text-moss font-bold block">סה"כ במתכון</span>
                                                    <span className="text-xs sm:text-sm font-bold text-forest">{analysisResult.totalCalories} קל׳</span>
                                                </div>
                                                <div className="bg-cream p-2.5 rounded-xl border border-sand">
                                                    <span className="text-[10px] text-moss font-bold block">משקל מבושל</span>
                                                    <span className="text-xs sm:text-sm font-bold text-forest">{cookedWeight} גרם</span>
                                                </div>
                                                <div className="bg-cream p-2.5 rounded-xl border border-sand">
                                                    <span className="text-[10px] text-moss font-bold block">כף הגשה</span>
                                                    <span className="text-xs sm:text-sm font-bold text-forest">~{tableSpoonWeight} גרם</span>
                                                </div>
                                            </div>

                                        </div>
                                    </div>

                                    {/* Ingredient Breakdown */}
                                    <div className="editorial-card p-6 rounded-3xl space-y-4">
                                        <h3 className="text-xs sm:text-sm font-bold text-forest flex items-center justify-between">
                                            <span className="flex items-center gap-2">
                                                <span className="w-1.5 h-1.5 bg-forest rounded-full"></span>
                                                פירוט רכיבים תזונתיים
                                            </span>
                                            <span className="text-[10px] text-moss uppercase font-semibold">פירוט AI</span>
                                        </h3>

                                        <div className="divide-y divide-sand">
                                            {analysisResult.ingredients && analysisResult.ingredients.map((ing, index) => (
                                                <div key={index} className="py-3.5 flex justify-between items-start text-xs sm:text-sm gap-3 first:pt-0 last:pb-0">
                                                    <div className="space-y-1.5 flex-grow">
                                                        <span className="font-bold text-forest block leading-tight">{ing.cleanName}</span>
                                                        <span className="text-[11px] text-moss block leading-relaxed">{ing.originalText}</span>

                                                        {/* Nutrient chips */}
                                                        <div className="flex flex-wrap gap-1.5 items-center pt-0.5">
                                                            <span className="text-[9px] bg-sage text-forest px-2 py-0.5 rounded font-bold">חלבון: {ing.protein || 0}ג׳</span>
                                                            <span className="text-[9px] bg-cream border border-sand text-terracotta px-2 py-0.5 rounded font-bold">פחמימות: {ing.carbs || 0}ג׳</span>
                                                            <span className="text-[9px] bg-cream border border-sand text-moss px-2 py-0.5 rounded font-bold">שומן: {ing.fats || 0}ג׳</span>
                                                        </div>
                                                    </div>
                                                    <div className="text-left flex-shrink-0">
                                                        <span className="font-bold text-forest block text-sm sm:text-base">{ing.calories} קל׳</span>
                                                        <span className="text-[10px] text-moss block font-bold">~ {ing.weightGrams} גרם</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                </div>
                            )}
                        </section>

                    </main>

                    {/* Exquisite Minimal Footer */}
                    <footer className="pt-8 pb-4 border-t border-sand text-center text-[11px] text-moss space-y-1">
                        <p className="font-bold text-forest">© 2026 FitBite AI • עוצב מחדש בעיצוב פרימיום נקי לטלפונים</p>
                        <p className="max-w-md mx-auto text-[10px] leading-relaxed px-4 text-moss/70">
                            מחשבון תזונה זה משתמש בטכנולוגיית בינה מלאכותית מתקדמת לזיהוי רכיבים וכמויות. מומלץ תמיד לוודא מוצרי אריזה מסוימים באופן ידני.
                        </p>
                    </footer>

                    {/* Sticky, ergonomic bottom navigation on Mobile */}
                    <nav className="lg:hidden fixed bottom-0 left-0 right-0 z-40 bg-white/95 backdrop-blur-xl border-t border-sand px-6 py-3 flex justify-around items-center shadow-lg pb-safe">

                        <button
                            onClick={() => setMobileSection("input")}
                            className={`flex flex-col items-center gap-1 transition-all ${mobileSection === 'input' ? 'text-forest' : 'text-moss/65'}`}
                        >
                            <div className={`p-2 rounded-xl transition-colors ${mobileSection === 'input' ? 'bg-sage' : 'bg-transparent'}`}>
                                <svg className="w-5.5 h-5.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                </svg>
                            </div>
                            <span className="text-[11px] font-bold">המתכון שלי</span>
                        </button>

                        <button
                            onClick={() => setMobileSection("calculator")}
                            className={`flex flex-col items-center gap-1 transition-all relative ${mobileSection === 'calculator' ? 'text-forest' : 'text-moss/65'}`}
                        >
                            <div className={`p-2 rounded-xl transition-colors ${mobileSection === 'calculator' ? 'bg-sage' : 'bg-transparent'}`}>
                                <svg className="w-5.5 h-5.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                                </svg>
                            </div>
                            <span className="text-[11px] font-bold">מחשבון קלוריות</span>
                            {analysisResult && (
                                <span className="absolute top-2.5 right-6.5 w-2 h-2 bg-forest rounded-full animate-ping"></span>
                            )}
                        </button>

                    </nav>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RecipeApp />);
    </script>
</body>
</html>
