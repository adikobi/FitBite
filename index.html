<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FitBite AI — מחשבון תזונה בעיצוב פרימיום</title>
    <!-- Tailwind CSS for modern sleek styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Heebo & JetBrains Mono for premium professional UI -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyberlime: '#CCFF00',
                        warmcoral: '#FF6B4A',
                        obsidian: '#04060A',
                        carbon: '#0D111A',
                        slateice: '#1E2533',
                    },
                    fontFamily: {
                        heebo: ['Heebo', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Heebo', sans-serif;
            background-color: #04060A;
            color: #E2E8F0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* Custom scrollbar for premium feel */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #04060A;
        }
        ::-webkit-scrollbar-thumb {
            background: #CCFF00;
            border-radius: 4px;
            border: 2px solid #04060A;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #b5e600;
        }

        /* Tactile physical elevation borders */
        .premium-card {
            background: rgba(13, 17, 26, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.7);
        }

        /* Glowing ambient radial backgrounds */
        .glow-radial-lime {
            background: radial-gradient(circle at 50% 0%, rgba(204, 255, 0, 0.08) 0%, transparent 70%);
        }
        .glow-radial-coral {
            background: radial-gradient(circle at 50% 0%, rgba(255, 107, 74, 0.08) 0%, transparent 70%);
        }

        /* Spring micro-interactions for buttons */
        .btn-spring {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.2s, box-shadow 0.2s;
        }
        .btn-spring:active {
            transform: scale(0.94);
        }

        @media (hover: hover) {
            .btn-spring:hover {
                transform: translateY(-1px);
            }
        }

        /* Jagged "Kitchen Ticket" effect using native CSS */
        .kitchen-ticket {
            position: relative;
            background: #111622;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .kitchen-ticket::after {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 0;
            right: 0;
            height: 8px;
            background-image: linear-gradient(-45deg, #04060A 4px, transparent 0), linear-gradient(45deg, #04060A 4px, transparent 0);
            background-size: 8px 8px;
        }

        /* Animated Scanner line */
        @keyframes scan-laser {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .laser-container {
            position: relative;
            overflow: hidden;
        }
        .laser-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #CCFF00, transparent);
            box-shadow: 0 0 12px #CCFF00;
            animation: scan-laser 2.5s infinite linear;
            pointer-events: none;
        }

        /* Bounce-in animation for notifications */
        @keyframes spring-bounce {
            0% { transform: translate(-50%, -40px) scale(0.9); opacity: 0; }
            50% { transform: translate(-50%, 20px) scale(1.03); }
            100% { transform: translate(-50%, 12px) scale(1); opacity: 1; }
        }
        .toast-bounce {
            animation: spring-bounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Hide native scrollbars on mobile */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between pb-24 md:pb-8 selection:bg-cyberlime selection:text-obsidian">

    <div id="root" class="w-full max-w-7xl mx-auto p-3 sm:p-5 md:p-8 flex-grow"></div>

    <!-- React and Babel Standalone for direct execution in browser -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const MY_TEXT = "AQ.Ab8RN6KvKgP9yzeXwZfQL1ewoM0ARnpe6QxRm8q3VqmzNoVzGw";

        // Tailored designer SVG Icons with modern styling
        const FlameIcon = () => (
            <svg className="w-6 h-6 text-obsidian" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                <path strokeLinecap="round" strokeLinejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        );

        const InfoIcon = () => (
            <svg className="w-4 h-4 text-cyberlime" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        const KeyIcon = () => (
            <svg className="w-4 h-4 text-cyberlime" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M15 7a2 2 0 012 2m-5 3a5 5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" />
            </svg>
        );

        const ShieldCheckIcon = () => (
            <svg className="w-5 h-5 text-cyberlime" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
        );

        const FileTextIcon = () => (
            <svg className="w-5 h-5 text-cyberlime" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
        );

        const SparklesIcon = ({ className = "w-5 h-5 text-cyberlime" }) => (
            <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
            </svg>
        );

        const HistoryIcon = () => (
            <svg className="w-4 h-4 text-warmcoral" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        const AlertTriangleIcon = () => (
            <svg className="w-5 h-5 text-warmcoral flex-shrink-0" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        );

        const CopyIcon = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
            </svg>
        );

        const TrashIcon = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        );

        function RecipeApp() {
            const [apiKey, setApiKey] = useState(() => {
                return localStorage.getItem("fitbite_api_key") || MY_TEXT;
            });
            const [showSettings, setShowSettings] = useState(false);
            const [recipeText, setRecipeText] = useState("");
            const [servings, setServings] = useState(4);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [toastMessage, setToastMessage] = useState("");
            
            const [analysisResult, setAnalysisResult] = useState(null);
            
            const [cookedWeight, setCookedWeight] = useState(320);
            const [tableSpoonWeight, setTableSpoonWeight] = useState(15);

            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem("fitbite_history");
                if (saved) {
                    try {
                        return JSON.parse(saved);
                    } catch (e) {
                        console.error("Error parsing history from localStorage", e);
                    }
                }
                return [
                    {
                        id: "demo-1",
                        recipeName: "פנקייק חלבון שיבולת שועל",
                        servings: 2,
                        totalCalories: 480,
                        totalWeightGrams: 320,
                        caloriesPer100g: 150,
                        caloriesPerTablespoon: 22,
                        gramsPerTablespoon: 15,
                        totalProtein: 32,
                        totalCarbs: 58,
                        totalFats: 12,
                        ingredients: [
                            { cleanName: "שיבולת שועל דקה", originalText: "כוס שיבולת שועל", weightGrams: 80, calories: 300, protein: 10, carbs: 53, fats: 5 },
                            { cleanName: "אבקת חלבון", originalText: "סקופ אבקת חלבון וניל", weightGrams: 30, calories: 120, protein: 24, carbs: 2, fats: 1.5 },
                            { cleanName: "חלב שקדים", originalText: "חצי כוס חלב שקדים", weightGrams: 120, calories: 30, protein: 1, carbs: 1, fats: 2.5 },
                            { cleanName: "ביצה לארג'", originalText: "ביצה אחת", weightGrams: 50, calories: 70, protein: 6, carbs: 0, fats: 5 }
                        ],
                        dietaryNotes: ["עשיר בחלבון", "מתאים לחיטוב", "דל סוכר"]
                    }
                ];
            });

            useEffect(() => {
                localStorage.setItem("fitbite_history", JSON.stringify(history));
            }, [history]);

            const [activeTab, setActiveTab] = useState("serving"); // "serving", "tablespoon", "100g", "custom"
            const [customGrams, setCustomGrams] = useState(100);
            const [mobileSection, setMobileSection] = useState("input");

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => {
                    setToastMessage("");
                }, 2800);
            };

            const loadDemoRecipe = () => {
                setRecipeText("גביע קוטג' 5% (250 גרם)\n2 ביצים\n3 כפות קמח שיבולת שועל (כ-30 גרם)\nקורט מלח ופלפל");
                setServings(2);
                showToast("🍳 מתכון לדוגמה נטען באהבה!");
            };

            const clearRecipeText = () => {
                setRecipeText("");
                showToast("✨ טופס הניתוח נוקה");
            };

            useEffect(() => {
                if (analysisResult) {
                    setCookedWeight(analysisResult.totalWeightGrams || 320);
                    setTableSpoonWeight(analysisResult.gramsPerTablespoon || 15);
                }
            }, [analysisResult]);

            const deleteFromHistory = (id, e) => {
                if (e) e.stopPropagation();
                setHistory(prev => {
                    const filtered = prev.filter(item => item.id !== id);
                    if (analysisResult && analysisResult.id === id) {
                        setAnalysisResult(null);
                    }
                    return filtered;
                });
                showToast("🗑️ המתכון הוסר מהארכיון");
            };

            const handleAnalyzeRecipe = async (e) => {
                if (e) e.preventDefault();
                if (!recipeText.trim()) {
                    setError("אנא הזיני קודם כל את טקסט המתכון.");
                    return;
                }

                setLoading(true);
                setError(null);

                const systemInstruction = `
                    You are an elite, professional nutritional science analyst and sports dietitian.
                    Analyze the recipe text provided by the user. Convert all ingredients into precise weights in grams and estimate their calories, protein, carbs, and fats correctly.
                    Estimate the physical state of the dish (e.g. liquid, thick paste, baking, light powder) and provide a smart estimated average weight of ONE single tablespoon of this combined recipe in "gramsPerTablespoon" (e.g., honey is ~21g, water/milk/soups are ~15g, heavy spreads/peanut butter are ~18-24g, light powders/cereals/coconut are ~5-8g).
                    Respond ONLY with a valid, clean JSON object. Do not include markdown code block syntax (like \`\`\`json) or any preamble or wrap up. Just raw JSON.
                    The JSON structure must match this exact format:
                    {
                      "recipeName": "Provide a descriptive name in Hebrew",
                      "totalCalories": total recipe calories (integer),
                      "totalWeightGrams": total weight of ingredients in grams (integer),
                      "caloriesPer100g": calories per 100g (integer),
                      "caloriesPerTablespoon": calories in one average tablespoon of this combined recipe (integer),
                      "gramsPerTablespoon": weight of one tablespoon of this recipe in grams (integer),
                      "totalProtein": total protein in recipe in grams (integer),
                      "totalCarbs": total carbohydrates in recipe in grams (integer),
                      "totalFats": total fats in recipe in grams (integer),
                      "ingredients": [
                        {
                          "originalText": "the original line of text",
                          "cleanName": "clean Hebrew name of ingredient",
                          "weightGrams": estimated weight in grams (integer),
                          "calories": estimated calories for this quantity (integer),
                          "protein": estimated protein in grams (integer),
                          "carbs": estimated carbohydrates in grams (integer),
                          "fats": estimated fats in grams (integer)
                        }
                      ],
                      "dietaryNotes": ["up to 3 tags in Hebrew about the recipe, e.g., 'דל פחמימה', 'חלבון גבוה', 'טבעוני', 'קל להכנה'"]
                    }
                `;

                const userPrompt = `
                    Recipe text to analyze:
                    ${recipeText}
                    
                    Number of planned servings: ${servings}
                `;

                try {
                    const response = await fetch(
                        "https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=" + apiKey,
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userPrompt }] }],
                                systemInstruction: {
                                    parts: [{ text: systemInstruction }]
                                },
                                generationConfig: {
                                    responseMimeType: "application/json"
                                }
                            })
                        }
                    );

                    if (!response.ok) {
                        throw new Error("שגיאה בתקשורת עם שרת ה-AI. ודאי שמפתח ה-API תקין.");
                    }

                    const data = await response.json();
                    let rawText = "";
                    if (data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
                        rawText = data.candidates[0].content.parts[0].text;
                    }
                    
                    if (!rawText) {
                        throw new Error("לא התקבלו נתונים תקינים מהאנליזה.");
                    }

                    const parsedResult = JSON.parse(rawText);
                    parsedResult.servings = parseInt(servings) || 1;
                    parsedResult.caloriesPerServing = Math.round(parsedResult.totalCalories / parsedResult.servings);
                    parsedResult.id = Date.now().toString();

                    setAnalysisResult(parsedResult);
                    setHistory(prev => [parsedResult, ...prev.filter(item => item.id !== "demo-1")]);
                    setActiveTab("serving");
                    setMobileSection("calculator");
                    showToast("🥗 המתכון נותח באופן מושלם!");
                } catch (err) {
                    console.error(err);
                    setError(err.message || "אירעה שגיאה בתהליך הניתוח. אנא נסי שנית.");
                } finally {
                    setLoading(false);
                }
            };

            const selectFromHistory = (item) => {
                setAnalysisResult(item);
                // Preserve full text recovery if original recipeText wasn't empty or save was simulated
                setRecipeText("");
                setServings(item.servings || 4);
                setActiveTab("serving");
                setMobileSection("calculator");
                showToast(`📂 נטען מהארכיון: ${item.recipeName}`);
            };

            const getCalculatedMetrics = () => {
                if (!analysisResult) return null;
                const totalCals = analysisResult.totalCalories;
                const totalProtein = analysisResult.totalProtein || 0;
                const totalCarbs = analysisResult.totalCarbs || 0;
                const totalFats = analysisResult.totalFats || 0;
                
                const currentWeight = cookedWeight > 0 ? cookedWeight : 1;
                const calPer100g = Math.round((totalCals / currentWeight) * 100);
                const proteinPer100g = Math.round((totalProtein / currentWeight) * 100);
                const carbsPer100g = Math.round((totalCarbs / currentWeight) * 100);
                const fatsPer100g = Math.round((totalFats / currentWeight) * 100);
                
                const calPerSpoon = Math.round((calPer100g / 100) * tableSpoonWeight);
                const proteinPerSpoon = Math.round((proteinPer100g / 100) * tableSpoonWeight);
                const carbsPerSpoon = Math.round((carbsPer100g / 100) * tableSpoonWeight);
                const fatsPerSpoon = Math.round((fatsPer100g / 100) * tableSpoonWeight);
                
                const calPerServing = Math.round(totalCals / servings);
                const proteinPerServing = Math.round(totalProtein / servings);
                const carbsPerServing = Math.round(totalCarbs / servings);
                const fatsPerServing = Math.round(totalFats / servings);

                return {
                    calPer100g, calPerSpoon, calPerServing,
                    proteinPer100g, carbsPer100g, fatsPer100g,
                    proteinPerSpoon, carbsPerSpoon, fatsPerSpoon,
                    proteinPerServing, carbsPerServing, fatsPerServing
                };
            };

            const metrics = getCalculatedMetrics();

            const getDisplayMetric = () => {
                if (!analysisResult || !metrics) return null;

                switch(activeTab) {
                    case "serving":
                        return {
                            val: metrics.calPerServing,
                            protein: metrics.proteinPerServing,
                            carbs: metrics.carbsPerServing,
                            fats: metrics.fatsPerServing,
                            label: "קלוריות למנה אישית",
                            sub: `לפי חלוקת סך הקלוריות ל-${servings} מנות שוות`
                        };
                    case "tablespoon":
                        return {
                            val: metrics.calPerSpoon,
                            protein: metrics.proteinPerSpoon,
                            carbs: metrics.carbsPerSpoon,
                            fats: metrics.fatsPerSpoon,
                            label: "קלוריות לכף הגשה",
                            sub: `מחושב לפי כף ששוקלת בדיוק ${tableSpoonWeight} גרם`
                        };
                    case "100g":
                        return {
                            val: metrics.calPer100g,
                            protein: metrics.proteinPer100g,
                            carbs: metrics.carbsPer100g,
                            fats: metrics.fatsPer100g,
                            label: "קלוריות ל-100 גרם",
                            sub: `מבוסס על משקל סופי מבושל של ${cookedWeight} גרם`
                        };
                    case "custom":
                        const customVal = Math.round((customGrams / 100) * metrics.calPer100g);
                        const customProtein = Math.round((customGrams / 100) * metrics.proteinPer100g);
                        const customCarbs = Math.round((customGrams / 100) * metrics.carbsPer100g);
                        const customFats = Math.round((customGrams / 100) * metrics.fatsPer100g);
                        return {
                            val: customVal,
                            protein: customProtein,
                            carbs: customCarbs,
                            fats: customFats,
                            label: `קלוריות ל-${customGrams} גרם`,
                            sub: "חישוב מותאם אישית לפי המשקל שהזנת"
                        };
                    default:
                        return null;
                }
            };

            const currentMetric = getDisplayMetric();

            const adjustCookedWeight = (amount) => {
                setCookedWeight(prev => Math.max(1, prev + amount));
            };

            const adjustCustomGrams = (amount) => {
                setCustomGrams(prev => Math.max(1, prev + amount));
            };

            const copySummaryToClipboard = () => {
                if (!analysisResult || !metrics) return;
                const summaryText = `
*סיכום תזונתי מ-FitBite AI* 🍳
מתכון: ${analysisResult.recipeName}
------------------------------
• סה״כ קלוריות למתכון: ${analysisResult.totalCalories} קל׳
• סה״כ חלבון: ${analysisResult.totalProtein || 0}ג׳ | פחמימות: ${analysisResult.totalCarbs || 0}ג׳ | שומן: ${analysisResult.totalFats || 0}ג׳
• משקל מבושל סופי: ${cookedWeight} גרם
• ערכים ל-100 גרם: ${metrics.calPer100g} קל׳ (ח׳: ${metrics.proteinPer100g}ג׳ | פ׳: ${metrics.carbsPer100g}ג׳ | ש׳: ${metrics.fatsPer100g}ג׳)
• ערכים למנה אחת (${servings} מנות): ${metrics.calPerServing} קל׳ (ח׳: ${metrics.proteinPerServing}ג׳ | פ׳: ${metrics.carbsPerServing}ג׳ | ש׳: ${metrics.fatsPerServing}ג׳)
• ערכים לכף הגשה (~${tableSpoonWeight} גרם): ${metrics.calPerSpoon} קל׳ (ח׳: ${metrics.proteinPerSpoon}ג׳ | פ׳: ${metrics.carbsPerSpoon}ג׳ | ש׳: ${metrics.fatsPerSpoon}ג׳)
------------------------------
נאכל בתיאבון ובריאות! 💪
`.trim();

                navigator.clipboard.writeText(summaryText);
                showToast("📋 הסיכום הועתק ללוח!");
            };

            return (
                <div className="space-y-6 md:space-y-8">

                    {/* Exquisite Spring Toast Notification */}
                    {toastMessage && (

                                                                >
                                                                    -
                                                                </button>
                                                                <span className="text-xs text-white font-black font-mono w-8 text-center">{tableSpoonWeight}g</span>
                                                                <button
                                                                    type="button"
                                                                    onClick={() => setTableSpoonWeight(tableSpoonWeight + 1)}
                                                                    className="w-8 h-8 bg-carbon text-cyberlime font-black rounded-lg flex items-center justify-center border border-white/5 btn-spring"
                                                                >
                                                                    +
                                                                </button>
                                                            </div>
                                                        </div>
                                                        <div className="grid grid-cols-3 gap-1.5">
                                                            {[
                                                                { w: 6, label: "קלה ~6ג׳ (פלקס)" },
                                                                { w: 15, label: "בינונית ~15ג׳ (נוזל)" },
                                                                { w: 24, label: "כבדה ~24ג׳ (ממרח)" }
                                                            ].map((opt) => (
                                                                <button
                                                                    key={opt.w}
                                                                    type="button"
                                                                    onClick={() => setTableSpoonWeight(opt.w)}
                                                                    className={`text-[10px] py-2 px-1 rounded-lg text-center border transition-all btn-spring font-bold ${
                                                                        tableSpoonWeight === opt.w
                                                                        ? 'bg-cyberlime text-obsidian border-cyberlime'
                                                                        : 'bg-carbon/50 border-white/5 text-slate-400'
                                                                    }`}
                                                                >
                                                                    {opt.label}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>

                                                </div>
                                            </div>

                                            {/* Custom Gram calculation box */}
                                            {activeTab === "custom" && (
                                                <div className="p-4 bg-obsidian rounded-2xl border border-white/5 space-y-3.5">
                                                    <h4 className="text-xs font-black text-slate-300">הגדירי כמות צריכה בגרמים בצלחת:</h4>
                                                    <div className="flex items-center gap-2">
                                                        <button
                                                            type="button"
                                                            onClick={() => adjustCustomGrams(-50)}
                                                            className="px-2.5 py-1.5 bg-carbon hover:bg-slateice text-[10px] font-black rounded-lg border border-white/5 btn-spring font-mono"
                                                        >
                                                            -50g
                                                        </button>
                                                        <button
                                                            type="button"
                                                            onClick={() => adjustCustomGrams(-10)}
                                                            className="px-2.5 py-1.5 bg-carbon hover:bg-slateice text-[10px] font-black rounded-lg border border-white/5 btn-spring font-mono"
                                                        >
                                                            -10g
                                                        </button>

                                                        <input
                                                            type="number"
                                                            pattern="[0-9]*"
                                                            inputMode="numeric"
                                                            value={customGrams === 0 ? "" : customGrams}
                                                            onChange={(e) => {
                                                                const val = e.target.value;
                                                                setCustomGrams(val === "" ? 0 : Math.max(0, parseInt(val) || 0));
                                                            }}
                                                            onBlur={() => {
                                                                if (customGrams === 0) setCustomGrams(100);
                                                            }}
                                                            className="flex-grow bg-obsidian border border-cyberlime/30 rounded-xl py-2 text-center text-sm font-black text-white focus:outline-none focus:border-cyberlime font-mono"
                                                        />

                                                        <button
                                                            type="button"
                                                            onClick={() => adjustCustomGrams(10)}
                                                            className="px-2.5 py-1.5 bg-carbon hover:bg-slateice text-[10px] font-black rounded-lg border border-white/5 btn-spring font-mono"
                                                        >
                                                            +10g
                                                        </button>
                                                        <button
                                                            type="button"
                                                            onClick={() => adjustCustomGrams(50)}
                                                            className="px-2.5 py-1.5 bg-carbon hover:bg-slateice text-[10px] font-black rounded-lg border border-white/5 btn-spring font-mono"
                                                        >
                                                            +50g
                                                        </button>
                                                    </div>

                                                    <div className="grid grid-cols-4 gap-1.5">
                                                        {[50, 100, 150, 200, 250, 300, 400, 500].map((v) => (
                                                            <button
                                                                key={v}
                                                                type="button"
                                                                onClick={() => setCustomGrams(v)}
                                                                className={`py-1.5 text-[10px] font-black rounded-lg border text-center transition-colors btn-spring font-mono ${
                                                                    customGrams === v
                                                                    ? 'bg-cyberlime border-cyberlime text-obsidian'
                                                                    : 'bg-carbon/50 border-white/5 text-slate-400 hover:bg-slateice'
                                                                }`}
                                                            >
                                                                {v}g
                                                            </button>
                                                        ))}
                                                    </div>

                                                    <div className="pt-3 border-t border-white/5 flex justify-between items-center text-[11px] font-bold text-slate-400">
                                                        <span>חלוקת כפות הגשה משוערכת:</span>
                                                        <span className="text-cyberlime font-black bg-cyberlime/5 px-2.5 py-1 rounded-lg border border-cyberlime/10 font-mono">
                                                            {Math.round((customGrams / (tableSpoonWeight || 15)) * 10) / 10} כפות
                                                        </span>
                                                    </div>
                                                </div>
                                            )}

                                            {/* Overview stats table */}
                                            <div className="grid grid-cols-3 gap-2 pt-3 border-t border-white/5 text-center">
                                                <div className="bg-obsidian/40 p-2.5 rounded-xl border border-white/5">
                                                    <span className="text-[10px] text-slate-500 font-bold block">סה"כ קלוריות</span>
                                                    <span className="text-xs sm:text-sm font-black text-white font-mono">{analysisResult.totalCalories}</span>
                                                </div>
                                                <div className="bg-obsidian/40 p-2.5 rounded-xl border border-white/5">
                                                    <span className="text-[10px] text-slate-500 font-bold block">משקל מבושל</span>
                                                    <span className="text-xs sm:text-sm font-black text-white font-mono">{cookedWeight}g</span>
                                                </div>
                                                <div className="bg-obsidian/40 p-2.5 rounded-xl border border-white/5">
                                                    <span className="text-[10px] text-slate-500 font-bold block">כף הגשה</span>
                                                    <span className="text-xs sm:text-sm font-black text-white font-mono">~{tableSpoonWeight}g</span>
                                                </div>
                                            </div>

                                        </div>
                                    </div>

                                    {/* Ingredient Breakdown Table */}
                                    <div className="premium-card p-5 sm:p-6 rounded-3xl space-y-4">
                                        <h3 className="text-xs sm:text-sm font-black text-slate-300 flex items-center justify-between">
                                            <span className="flex items-center gap-2">
                                                <span className="w-1.5 h-1.5 bg-cyberlime rounded-full"></span>
                                                פירוט וניתוח הרכיבים (AI Smart)
                                            </span>
                                            <span className="text-[10px] text-slate-500 uppercase">Ingredient Breakdown</span>
                                        </h3>

                                        <div className="divide-y divide-white/5">
                                            {analysisResult.ingredients && analysisResult.ingredients.map((ing, index) => (
                                                <div key={index} className="py-3.5 flex justify-between items-start text-xs sm:text-sm gap-3 first:pt-0 last:pb-0">
                                                    <div className="space-y-1.5 flex-grow">
                                                        <span className="font-extrabold text-slate-100 block leading-tight">{ing.cleanName}</span>
                                                        <span className="text-[11px] text-slate-500 block leading-relaxed">{ing.originalText}</span>

                                                        {/* Nutrient chip badges */}
                                                        <div className="flex flex-wrap gap-1.5 items-center pt-0.5">
                                                            <span className="text-[9px] bg-blue-500/10 text-blue-400 px-2 py-0.5 rounded font-bold font-mono">P: {ing.protein || 0}g</span>
                                                            <span className="text-[9px] bg-amber-500/10 text-amber-400 px-2 py-0.5 rounded font-bold font-mono">C: {ing.carbs || 0}g</span>
                                                            <span className="text-[9px] bg-rose-500/10 text-rose-400 px-2 py-0.5 rounded font-bold font-mono">F: {ing.fats || 0}g</span>
                                                        </div>
                                                    </div>
                                                    <div className="text-left flex-shrink-0">
                                                        <span className="font-black text-white block text-sm sm:text-base font-mono">{ing.calories} kcal</span>
                                                        <span className="text-[10px] text-cyberlime block font-bold font-mono">~ {ing.weightGrams}g</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                </div>
                            )}
                        </section>

                    </main>

                    {/* Exquisite Footer */}
                    <footer className="pt-8 pb-4 border-t border-white/5 text-center text-[11px] text-slate-500 space-y-1">
                        <p className="font-bold">© 2026 FitBite AI • עוצב מחדש באופן אנושי וייחודי לטלפונים</p>
                        <p className="max-w-md mx-auto text-[10px] leading-relaxed px-4 text-slate-600">
                            מחשבון תזונה זה משתמש בטכנולוגיית בינה מלאכותית מתקדמת לזיהוי רכיבים וכמויות. מומלץ תמיד לוודא מוצרי אריזה מסוימים באופן ידני.
                        </p>
                    </footer>

                    {/* Sticky, ergonomic bottom navigation on Mobile */}
                    <nav className="lg:hidden fixed bottom-0 left-0 right-0 z-40 bg-obsidian/95 backdrop-blur-xl border-t border-white/5 px-6 py-3 flex justify-around items-center shadow-[0_-10px_35px_rgba(0,0,0,0.8)] pb-safe">

                        <button
                            onClick={() => setMobileSection("input")}
                            className={`flex flex-col items-center gap-1 transition-all ${mobileSection === 'input' ? 'text-cyberlime' : 'text-slate-500'}`}
                        >
                            <div className={`p-2 rounded-xl transition-colors ${mobileSection === 'input' ? 'bg-cyberlime/10' : 'bg-transparent'}`}>
                                <svg className="w-5.5 h-5.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                </svg>
                            </div>
                            <span className="text-[11px] font-black">המתכון שלי</span>
                        </button>

                        <button
                            onClick={() => setMobileSection("calculator")}
                            className={`flex flex-col items-center gap-1 transition-all relative ${mobileSection === 'calculator' ? 'text-cyberlime' : 'text-slate-500'}`}
                        >
                            <div className={`p-2 rounded-xl transition-colors ${mobileSection === 'calculator' ? 'bg-cyberlime/10' : 'bg-transparent'}`}>
                                <svg className="w-5.5 h-5.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                                </svg>
                            </div>
                            <span className="text-[11px] font-black">מחשבון קלוריות</span>
                            {analysisResult && (
                                <span className="absolute top-2.5 right-6.5 w-2 h-2 bg-cyberlime rounded-full animate-ping"></span>
                            )}
                        </button>

                    </nav>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RecipeApp />);
    </script>
</body>
</html>
